seed: 42

data:
  root: ./data
  image_size: 256
  channels: 3
  num_workers: 4
  # List of (weight, path) pairs for mixed-modality sampling. If null, uses `root` as single source.
  modalities: null

model:
  in_channels: 3
  base_filters: 64
  num_dilated_blocks: 4
  init_log_sigma: -0.5

action:
  # Log-symmetric ranges centered at the multiplicative identity (γ=1, α=1).
  # With log_param=true, raw=0 -> deterministic identity, giving a clean
  # residual-to-identity initialization (combined with zero-init policy heads).
  gamma_range: [0.5, 2.0]
  alpha_range: [0.7071067811865476, 1.4142135623730951]   # 1/√2, √2
  beta_range: [-0.1, 0.1]
  gamma_log_param: true
  alpha_log_param: true

reward:
  # `terminal_borda`: reward only at episode end via per-head rank aggregation
  # over `borda_heads`. The legacy CompositeReward is still constructed (with
  # the dummy weight below) but is not called during GRPO terminal-borda
  # rollouts.
  mode: terminal_borda
  pixel_smooth_radius: 0
  relative: false
  # Dummy non-zero weight so CompositeReward can instantiate; never invoked
  # in terminal_borda + GRPO mode. Set physics weights to 0 elsewhere.
  weights:
    gradient: 1.0
    entropy: 0.0
    eme: 0.0
    clipiqa: 0.0
    musiq: 0.0
  scales:
    gradient: 1.0
    entropy: 1.0
    eme: 1.0
    clipiqa: 1.0
    musiq: 1.0
  # IQA heads used by terminal-Borda. v6 mixes two unary IQA heads
  # (clipiqa, musiq — coarse proxies) with three **input-anchored** heads
  # that are bounded ≤ 0 and maximised at x_K = x_0:
  #   identity_l1 : -mean |x_K - x_0|
  #   lpips       : -LPIPS(x_K, x_0)   (VGG16, frozen)
  #   gray_world  : Zero-DCE L_color on x_K (unary but bounded)
  # Theory: Gao et al. 2023's scaling-law bound requires the reward to be
  # bounded and input-anchored — otherwise the policy learns to regress to
  # the training-distribution mean (the v4/v5 failure mode).
  borda_heads:
    - clipiqa
    - musiq
    - identity_l1
    - lpips
    - gray_world
  # LPIPS backbone (vgg|alex|squeeze). vgg is the Zhang-et-al default.
  lpips_net: vgg
  # Optional path to a JSON produced by `scripts/precompute_iqa_target.py`.
  # When set, terminal-Borda scores rollouts by -((IQA(x_K) - μ)/σ)² instead
  # of Δ-from-baseline. Anchors the policy to the natural-image IQA
  # distribution per head (Option A target reward) — kills the "more is more"
  # over-brightening failure mode seen with Δ-Borda. Leave null to use
  # Δ-from-baseline scoring (legacy).
  iqa_target_path: null

env:
  episode_length: 5

train:
  batch_size: 8
  lr: 3.0e-4
  total_updates: 4000           # outer PPO updates; inner rollouts happen every update
  rollouts_per_update: 1        # one episode per batch before optimizing
  ppo_epochs: 4
  minibatch_size: 8             # within each PPO update
  clip_ratio: 0.2
  value_coef: 0.5
  entropy_coef: 0.01
  entropy_coef_min: 0.001
  entropy_anneal_steps: 20000
  gae_gamma: 0.99
  gae_lambda: 0.95
  max_grad_norm: 0.5
  normalize_advantage: true
  device: cuda
  algorithm: grpo               # {ppo, grpo}; terminal_borda requires grpo

grpo:
  group_size: 8
  beta_kl: 0.02                 # KL to identity policy (Goodhart bound, Gao et al. 2023)
  init_log_sigma_ref: -0.5      # σ_ref of the identity reference policy (raw space)
  drop_critic: true
  # If true, sibling rollouts in a group share noise spatially (one [B,3,1,1]
  # draw broadcast across H,W), differing only by a global per-channel tone
  # shift. Restores Borda informativeness vs per-pixel-independent noise that
  # produces 8 indistinguishable noise fields.
  shared_global_noise: true
  # v6 state augmentation: prepend IQA(x_0) broadcast channels to the policy
  # input so actions can condition on *current quality*. Each name must be a
  # key in the Borda heads dict. Values are normalised to ~[0,1] (musiq /= 100).
  # Policy in_channels auto-grows to 3 + len(state_aug_iqa).
  state_aug_iqa:
    - clipiqa
    - musiq

log:
  dir: ./runs
  run_name: default
  interval: 20                  # log scalars every N updates
  image_interval: 500           # log enhanced samples every N updates
  num_log_images: 4
  backend: tensorboard          # {tensorboard, none}

checkpoint:
  dir: null                     # defaults to <log.dir>/<run_name>/checkpoints
  interval: 500
  keep_last: 3
